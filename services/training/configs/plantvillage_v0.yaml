# PlantVillage-only v0 training config.
#
# Trains against the dataset uploaded to the HF Hub by the Kaggle prep
# notebook — only the 14 crops PlantVillage actually contains. The
# fuller 20-crop baseline lives in baseline.yaml and will be re-enabled
# in v0.1 once we patch the dataset prep pipeline to also pull PlantDoc
# and IP102.
#
# Target hardware: A100-large (80 GB). ~3-4 hours for 30 epochs.
# On a T4-small drop batch_size to 16 and expect ~12-15 hours.
name: plantvit-v0-plantvillage

data:
  train_dir: "data/combined/train"
  val_dir:   "data/combined/val"
  image_size: 224
  num_workers: 8

  # Order = label index. The inference service reads labels.json from
  # the export bundle so the runtime stays in sync. Keep alphabetical
  # for diffability across runs.
  crop_labels:
    - Apple
    - Blueberry
    - Cherry
    - Corn
    - Grape
    - Orange
    - Peach
    - Pepper
    - Potato
    - Raspberry
    - Soybean
    - Squash
    - Strawberry
    - Tomato

  infection_labels:
    - insect_pest
    - fungal
    - viral
    - bacterial
    - nematode
    - nutrient_deficiency
    - abiotic_stress
    - weed_competition
    - unknown

  class_separator: "___"

  # PlantVillage disease folder names mapped to our canonical infection
  # enum. Anything unmapped falls through to "unknown".
  disease_to_infection:
    Apple_scab: fungal
    Black_rot: fungal
    Cedar_apple_rust: fungal
    Powdery_mildew: fungal
    Cercospora_leaf_spot_Gray_leaf_spot: fungal
    Common_rust_: fungal
    Northern_Leaf_Blight: fungal
    "Esca_(Black_Measles)": fungal
    "Leaf_blight_(Isariopsis_Leaf_Spot)": fungal
    "Haunglongbing_(Citrus_greening)": bacterial
    Bacterial_spot: bacterial
    Early_blight: fungal
    Late_blight: fungal
    Leaf_Mold: fungal
    Septoria_leaf_spot: fungal
    Spider_mites_Two_spotted_spider_mite: insect_pest
    Target_Spot: fungal
    Tomato_Yellow_Leaf_Curl_Virus: viral
    Tomato_mosaic_virus: viral
    Leaf_scorch: fungal
    healthy: unknown

model:
  backbone: "google/vit-base-patch16-224"
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.1
  lora_target_modules: ["query", "value"]
  dropout: 0.1

train:
  epochs: 30
  # T4 16GB can't hold ViT-base + LoRA at batch 64 (the A100 default).
  # Drop to 16 micro-batch with grad accumulation 4 so the effective
  # batch (= optimizer step size) stays 64 and the learning-rate /
  # warmup schedule we picked is still sensible.
  batch_size: 16
  grad_accumulation_steps: 4
  # IMPORTANT: keep scientific notation with a decimal point (5.0e-4,
  # not 5e-4). PyYAML's float resolver requires the decimal — bare
  # `5e-4` parses as the string "5e-4" and AdamW chokes on `lr <= 0`.
  learning_rate: 5.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.05
  mixed_precision: true
  seed: 42
  save_every: 1
  log_every: 50
  early_stop_patience: 4
  infection_loss_weight: 1.5

export:
  out_dir: "runs/plantvit-v0/export"
  quantize: true
  opset: 17
